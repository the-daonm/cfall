apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-pod
  namespace: default
  labels:
    gpu-fallback: "true"
  annotations:
    gpu-fallback.example.com/enabled: "true"
    # Set the force annotation to "true" to test fallback locally even if GPUs are available
    # gpu-fallback.example.com/force: "true"
spec:
  restartPolicy: Never
  containers:
    - name: test-container
      image: python:3.11-slim
      command: ["python", "-c"]
      args:
        - |
          import os
          import sys
          
          gpu_fallback_active = os.environ.get('GPU_FALLBACK_ACTIVE')
          cuda_visible = os.environ.get('CUDA_VISIBLE_DEVICES')
          
          print("--- GPU Fallback Verification ---")
          print(f"GPU_FALLBACK_ACTIVE: '{gpu_fallback_active}'")
          print(f"CUDA_VISIBLE_DEVICES: '{cuda_visible}'")
          
          if gpu_fallback_active == "true":
              print("Result: CPU Fallback is ACTIVE (Successful webhook mutation)")
          else:
              print("Result: Running on GPU (No fallback triggered)")
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "500m"
          memory: "512Mi"
        requests:
          nvidia.com/gpu: "1"
          cpu: "100m"
          memory: "256Mi"
